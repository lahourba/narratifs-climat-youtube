al quand\nil s'agit de reloger une population. Vous ne pouvez pas reloger une population de pêcheurs\nà 10 km de la côte. Là, on est très local. Mais je pense que la communauté\ninternationale doit se doter à l'échelle globale de fonds\nde solidarité, par exemple, qui soient vraiment à même\nde répondre aux futurs enjeux. -Vous sentez\nune prise de conscience ? Le changement, c'est à la fois loin. -Je suis impressionné de la prise\nde conscience mondiale. On en parle de l'Ethiopie à la Chine. Tout le monde sait\nque quelque chose arrive. Seule une petite minorité\nle nie encore. -Même dans le Bureau ovale.\n-Absolument. Mais quand il s'agit d'avoir\nla volonté politique d'agir, de se rendre compte\nqu'on a un risque incommensurable... Le vrai risque aujourd'hui\npour l'humanité n'est pas un risque militaire,\nmais le changement climatique. -Etienne Piguet, géographe et spécialiste de ces questions\nde migrations climatiques, merci. -Merci. -Maintenant ce sujet\nde \"Temps Présent\" qui, en 2013 déjà, parlait de réfugiés climatiques\nen Suisse. Direction les Alpes. Un destin annonciateur de ce qui attend peut-être\nles régions de montagne. -Ici, de mémoire d'homme,\nne tombaient que les avalanches, mais depuis 4 ans,\nquand il fait chaud, dévalent aussi des masses de rochers et de boue,\ndurant des heures. Tout a commencé à bouger\nau Ritzlihorn, à 3'000 m d'altitude, où l'influence du réchauffement climatique est la plus forte. Là-haut, ce ciment des montagnes\nqu'est le permafrost fond dans les fissures des parois. -Je connais bien ce couloir,\net le Ritzlihorn aussi. Je sais qu'il n'y a aucun futur ici. Si ce n'est pas cette année, ce sera la suivante, ou dans 10 ans. Mais je sais bien\nqu'un événement va se produire, pas besoin d'un géologue\npour me le dire. Quand vient l'orage,\nc'est clair que je suis anxieux. Quand l'orage est fini, je respire:\n\"Ouf, c'est passé.\" Il rigole -Et votre épouse ? -C'est pour elle qu'on a pris\nun deuxième appartement. Quand il ue Jérôme Gleizes ne se définit pas du tout comme quelqu’un de l’écologie bourgeoise. Plein d’autres militants de ce parti ne se définissent pas comme ça. Jérôme Gleizes, visiblement, lui, il a pris la tangente. Il est ingénieur je crois, il est enseignant dans le supérieur, donc il a quand même une position qui, du point de vue des sciences sociales, de la sociologie, le situe plutôt bien en haut à gauche de l’espace social. — Alors, c’est vrai... — Vous dites : « C’est le cas pour beaucoup de cadres de ce parti, mais aussi au-delà, pour tous les gens qui produisent les politiques écologiques. » Oui, alors je renvoie là aux travaux de ma collègue Vanessa Jérôme, qui est la spécialiste en sociologie politique du parti des Écologistes et qui pointe quelque chose qui réunit les Écologistes par-delà leur diversité. C’est un habitus minoritaire. Ils se sentent toujours un peu minoritaires. C’est sûr qu’ils ne vont pas avoir tendance à se situer dans les classes dominantes et pourtant, quand on regarde leur position sociale, on voit qu’ils sont très attachés à l’ordre établi. C’est ce qui d’ailleurs permet de comprendre leur adhésion à ce que j’appelle la pondération, cette capacité à concilier les contraires. À la fois, c’est ce qui m’avait frappé, ce que j’avais essayé de comprendre : ce sont les premiers à dire : « Il y a une urgence écologique, on ne peut plus continuer comme ça », et en même temps à ne pas remettre réellement en cause un ordre social auquel ils doivent beaucoup. C’est ça qu’il faut comprendre. Ils doivent beaucoup à l’ordre établi et donc, c’est quand même des gagnants dans cette affaire-là. Est-ce que c’est pas un peu injuste aussi parce que les Écologistes, ils sont aussi très attaqués, caricaturés comme des « Khmers verts », qui prôneraient une écologie punitive ou souhaiteraient même le retour à la bougie. On entend ça tout le temps, à partir des macronistes, jusqu’à l’extrême droite, en fait. Ou même comme des complices de soi-disant écoterroristes. Par exemple, quand Marine Tondelier était à Sainte-Soline avec plein de gens du mouvement social, ils ont été associés à ça, avec cette volonté de certains à droite, même très facilement à LFI, hors du cadre républicain, mais c’est pareil aussi pour les écologistes. Est-ce que ce n’est pas aussi quand même... Est-ce que c’est pas aussi des gens qui veulent déranger quand même un ordre social établi, malgré ces positions bourgeoises ? Alors, ils veulent... Ils veulent le réformer, ils veulent, effectivement, faire bouger certains secteurs, certaines pratiques. C’est vrai. Et effectivement, piétonniser un centre-ville, électrifier une flotte automobile d’un grand groupe comme La Poste, produire de manière écologique, fabriquer de l’écoconception, etc. Pour ceux qui les mettent en œuvre, ça donne réellement l’impression que le changement est en marche. C’est des changements qui ne sont pas neutres et qui peuvent chatouiller des intérêts sociaux assez forts. Mais justement, c’est ça qui est intéressant, c’est que comme ces changements se font dans un cadre qui est, lui, inchangé, ça génère ces attaques-là. Ils produisent ces attaques-là. On peut prendre un autre exemple que je trouve parlant. En 2018, il y a un mouvement qui est venu de Suède avec Greta Thunberg notamment, qui est le flight shame. En français, on dit « l’avihonte », la honte de prendre l’avion, avec l’idée qu’il faut valoriser le train. On a vu une forte valorisation des transports en train, des récits sur Instagram de gens qui avaient fait 72 heures de train et c’était fabuleux de faire 72 heures de train. Formidable. Prenons le train. Vous avez vu le prix des billets de train aujourd’hui, à quel point le train s’est embourgeoisé, est de plus en plus discriminant ? On voit bien que c’est pareil. Là, ça va générer du mépris de classe et générer du ressentiment, cette affaire-là. Il faut d’abord transformer profondément les politiques du rail, refaire un service public du rail digne de ce nom, qui es sites touristiques bondés, d'autres s'inquiètent de la chaleur estivale, de la possibilité de tremblements de terre ou de l'augmentation du coût des voyages en raison du renforcement du yen. Cependant, comme je l'ai mentionné dans ma vidéo précédente, je dis toujours : « Si vous voulez venir au Japon, venez le plus tôt possible ». Mais je n’ai pas entièrement expliqué pourquoi je ressens cela. Dans cette vidéo, je partagerai mes réflexions sur la base de 9 risques clés qui pourraient avoir un impact sur votre voyage. En regardant cette vidéo, vous comprendrez non seulement pourquoi vous devriez bientôt visiter le Japon, mais vous pourrez également vivre un voyage amusant et confortable au Japon. Alors restez dans les parages et regardez jusqu’à la fin. Alors commençons. No1.Destinations disparues Le Japon est un grand pays avec une population de 125 millions d'habitants, mais d'ici 2050, on prévoit que cette population diminuera de 30 millions, pour atteindre 95 millions. Cela équivaut à perdre toute la population de la région du Grand Tokyo. Avec cette baisse, les recettes fiscales diminueront, rendant plus difficile l’entretien des sites touristiques. Les sites touristiques sont également confrontés à des risques de catastrophes. Par exemple, le château de Shuri à Okinawa a été détruit par un mystérieux incendie en 2019 et le château de Kumamoto, l'un des trois plus grands châteaux du Japon, a été gravement endommagé par un tremblement de terre en 2016. Bien que les deux soient en cours de restauration, les experts affirment qu'il est presque impossible de restaurer complètement. les à leur état d'origine. De plus, le surtourisme a conduit à de nouvelles restrictions. Par exemple, le mont Fuji est désormais soumis à des réglementations plus strictes et dans le district de Gion à Kyoto, où se produisent les geishas, ​​certaines zones sont désormais interdites aux touristes. Cela signifie donc que les destinations touristiques que vous vous attendez à voir aujourd’hui pourraient ne pas être les mêmes lorsque vous les visiterez à l’avenir. No2. Culture en voie de disparition Comme je l'ai mentionné plus tôt, la population du Japon devrait diminuer de 30 millions d'ici 2050, passant de 125 millions à 95 millions. Ce déclin démographique crée un problème sérieux : il y a moins de successeurs pour perpétuer les fêtes historiques du pays. De nombreuses fêtes traditionnelles japonaises constituent des attractions touristiques majeures, mais il devient de plus en plus difficile de les maintenir. Dans le même temps, les auberges japonaises traditionnelles, qui constituent une partie importante du patrimoine culturel japonais et sont très populaires auprès des visiteurs étrangers, sont également en déclin chaque année. Cela est dû en partie à l’occidentalisation du Japon et à la présence croissante de chaînes hôtelières mondiales, qui détournent la demande de ces hébergements traditionnels. Cela signifie qu'à l'avenir, certains des éléments culturels les plus appréciés du Japon, comme les festivals et les auberges japonaises traditionnelles, pourraient disparaître. No3.Surpeuplement La popularité du Japon auprès des touristes étrangers monte en flèche. En juillet 2024, le nombre de visiteurs a atteint 3,29 millions, soit une augmentation de 10,9 % par rapport à l'année précédente. Il s'agit du cinquième mois consécutif avec plus de 3 millions de visiteurs, atteignant un nombre record. En conséquence, des destinations touristiques populaires comme Kyoto et le Mont Fuji sont confrontées à des problèmes de surtourisme. Mais selon le gouvernement japonais, il s'attend à 35 millions de visiteurs d'ici la fin de 2024, et l'objectif est de presque doubler ce chiffre pour atteindre 60 millions d'ici 2030. Cette tendance est donc susceptible de se poursuivre, et plus de visiteurs entraînent plus de monde. Pour résoudre ce problème, le gouvernement japonais s'efforce d'encourager les touristes étrangers à explorer les zones régionales afin d'alléger la pression sur les grandes villes. Si vous souhaitez en savoir plus sur certaines superbes destinations rurales, regardez ma vidéo précédente. No4.Frais de voyage Le Japon a connu une chute historique de sa monnaie, le yen atteignant son plus bas niveau depuis 30 ans. Cela a rendu les voyages au Japon environ 40 % moins chers pour les touristes étrangers par rapport aux prix d'avant la pandémie. Cependant, cette tendance commence à changer. Fin juillet 2024, la Banque du Japon a relevé ses taux d’intérêt, tandis que la Réserve fédérale américaine a fait allusion à une baisse des taux en raison du ralentissement de l’inflation. En conséquence, le yen s'est renforcé, passant de 160 yens à 143 yens pour un dollar américain, marquant son plus haut niveau depuis quatre mois et demi. En outre, après des décennies de stabilité des prix, le Japon est désormais confronté à une hausse des coûts due à des facteurs externes tels que les prix du pétrole et les fluctuations monétaires. De plus, comme je l’ai mentionné dans ma vidéo précédente, le gouvernement japonais envisage également de nouvelles taxes touristiques. Tous ces changements signifient que le coût d’un voyage au Japon va probablement augmenter dans un avenir proche. No5. Entretien des infrastructures de transport Comme je l'ai mentionné dans le premier chapitre, la population du Japon devrait diminuer de 125 millions à 95 millions d'ici 2050. Avec cette baisse de la population, les recettes fiscales vont probablement diminuer, ce qui rendra plus difficile le maintien du niveau actuel des transports. infrastructures à travers le pays. Les zones rurales, en particulier, pourraient voir les services de train et de bus fermés en raison d'un manque de rentabilité. Cela signifie qu'il devient difficile d'atteindre certaines destinations si les transports publics ne sont plus disponibles. Dans certains cas, les taxis peuvent être la seule option, ce qui peut être assez coûteux. Comme je l'ai mentionné dans ma vidéo précédente, les taxis japonais sont notoirement chers, il est donc préférable de les éviter lorsque cela est possible. No6.Changement climatique Le Japon ressent déjà les effets du réchauffement climatique, avec des températures qui augmentent chaque année. Les phénomènes météorologiques extrêmes se multiplient et l'été, de juillet à septembre, devient de plus en plus insupportable avec une humidité élevée et une chaleur torride. Les appels d’urgence pour coup de chaleur augmentent chaque année. En 2024, la saison des fleurs de cerisier a été retardée d'environ une semaine et la saison des pluies a commencé deux semaines plus tard que d'habitude. De même, la saison des feuillages d'automne devrait également être retardée, comme l'a annoncé le gouvernement japonais en septembre 2024. À mesure que ces changements climatiques deviennent plus fréquents, il est possible que certaines régions n'aient plus leurs fleurs de cerisier ou leurs feuilles d'automne emblématiques. avenir. No7.Catastrophe Comme beaucoup d'entre vous le savent, le Japon est l'un des pays au monde les plus sujets aux tremblements de terre. En août 2024, le gouvernement japonais a émis un avertissement indiquant qu'il y avait 70 % de chances qu'un tremblement de terre massif dans la fosse de Nankai, d'une magnitude de 8 à 9, se produise au cours des 30 prochaines années. Cela a fait la une des journaux dans le monde entier, vous en avez donc peut-être déjà entendu parler. Historiquement, ce type de tremblement de terre se produit tous les 90 à 150 ans et, avec le temps, la probabilité qu'il se produise augmente. J'ai expliqué cela plus en détail dans une vidéo précédente, alors n'hésitez pas à y jeter un oeil si vous êtes intéressé. En outre, les effets du réchauffement climatique contribuent également à des typhons plus fréquents et plus puissants, ce qui accroît encore les risques de catastrophe au Japon. No8.Détérioration de la sécurité Le Japon est largement connu comme l'un des pays les plus sûrs pour les voyageurs, avec de faibles taux de criminalité et une réputation de sécurité. Cependant, on dit souvent qu’il existe un lien entre l’économie et la sécurité publique : lorsque l’économie est en difficulté, les taux de criminalité peuvent augmenter. Malheureusement, l'économie japonaise stagne depuis 30 ans et nous commençons à assister à des incidents autrefois impensables. Il est également important de se méfier des fraudeurs qui ciblent les touristes. Quelques exemples incluent de faux moines demandant des dons, des bars illégaux dans des endroits comme Shinjuku ou Roppongi qui facturent des prix scandaleux, et même des incidents où des boissons sont enrichies de somnifères pour voler les gens. Votre sécurité est la priorité absolue lorsque vous voyagez, alors assurez-vous de rester vigilant. J'ai couvert plus de détails sur ces escroqueries dans ma vidéo précédente, alors assurez-vous d'y jeter un œil. No9.Aliments japonais Ces dernières années, l'industrie japonaise des fruits de mer a connu une baisse significative des captures de poisson par rapport à il y a dix ans. Les poissons comme le balaou du Pacifique, le saumon, la limande à queue jaune, le calmar et le maquereau espagnol sont de plus en plus difficiles à attraper au cours de leurs saisons traditionnelles. L’une des principales raisons en est le changement climatique : les eaux autour du Japon se réchauffent, ce qui pousse ces poissons à migrer plus au nord. Si cette tendance se poursuit, les sushis et les sashimis, deux des plats les plus populaires au Japon, pourraient devenir beaucoup plus chers et plus difficiles à trouver à l'avenir. No10.Conclusion & Conseils À la lumière des 9 risques dont j'ai parlé, je crois fermement que si vous envisagez de visiter le Japon, vous devriez le faire le plus tôt possible. Le Japon que vous imaginez aujourd’hui ne sera peut-être pas le même lorsque vous déciderez de le visiter dans le futur. C'est pourquoi je vous recommande de planifier votre voyage le plus tôt possible. Je crois sincèrement que visiter maintenant sera une expérience plus agréable et plus confortable que d'attendre 5 ou 10 ans. J'espère que vous pourrez explorer les magnifiques sites touristiques, la nature, la culture et la cuisine du Japon tout en restant abordables et accessibles. Comment était cette vidéo ? Veuillez partager vos réflexions dans la section commentaires. N'oubliez pas de vous abonner à ma chaîne et d'aimer le bouton. Rendez-vous dans ma prochaine vidéo, au revoir !"}, {"video_id": "QCcstT08FnY", "title": "Jean-Marc Belotti : ZFE, contrôle technique... l'alerte de la FFMC !", "channel": "Le Parti de Gauche", "views": 12930, "date": "2025-04-07", "url": "https://www.youtube.com/watch?v=QCcstT08FnY", "description": "Stationnement payant, contrôle technique obligatoire, restrictions de circulation avec les ZFE… Les motards sont-ils devenus une cible facile ? Derrière ces mesures, s'agit-il d'une véritable transition écologique ou d’une stratégie déguisée pour taxer et limiter la moto ?\n\n🎙 Jean-Marc Belotti, coordinateur de la Fédération Française des Motards en Colère (FFMC) Paris et grande couronne, décrypte la situation et répond aux questions qui fâchent.\nAu programme :\n- Le contrôle technique moto : une mesure absurde ?\n- ZFE et écologie punitive : la moto est-elle réellement un problème ?\n- Comment défendre la liberté de circuler ?\n\n📢 Réagissez en commentaire : ces mesures sont-elles justifiées ou une arnaque déguisée ?\n\n@giuseppeaviges", "transcript": "Bonjour à tous, bienvenue au partie de gauche. Aujourd'hui, on reçoit Jean-Marc Belloti pour nous parler moto. La moto, c'est euh un façon de vivre, un symbole de résistance pour d'autres. Oui. Plein de sujets qui dépassent aussi les deux roues. La liberté de la circulation euh en Franceou. Ouais. Et la mobilité h a des des des lois parfois très compliquées. On va le voir pour les motards. Est-ce que tu peux te présenter en quelques phrases ? Oui. Alors, je m'appel const LABELS = [
 {k:'URGENCE_MOBILISATION',t:'Urgence & mobilisation',d:'crise grave, action forte et rapide'},
 {k:'SCIENCE_PEDAGOGIE',t:'Science & pédagogie',d:'explication factuelle, données, GIEC, neutre'},
 {k:'SOLUTIONS_TECHNO',t:'Solutions & techno',d:'renouvelables, sobriété, innovation, gestes'},
 {k:'SCEPTICISME_MINIMISATION',t:'Scepticisme & minimisation',d:'conteste la SCIENCE : gravité/consensus/origine'},
 {k:'CRITIQUE_INACTION',t:"Critique de l'inaction",d:'réclame PLUS : inaction, greenwashing, lobby fossile'},
 {k:'OPPOSITION_ECOLOGIE',t:"Opposition à l'écologie",d:'écologie punitive, anti-ZFE, coût renouvelables'},
 {k:'ANXIETE_EFFONDREMENT',t:'Anxiété & effondrement',d:'collapsologie, fatalisme, éco-anxiété'},
];
const KEY='janco_kappa_codes';
let codes = JSON.parse(localStorage.getItem(KEY) || '{}');
let idx = 0;
const fmt = n => (n||0).toLocaleString('fr-FR');
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function save(){localStorage.setItem(KEY, JSON.stringify(codes));}
function countDone(){return DATA.filter(v=>codes[v.video_id]&&codes[v.video_id].label).length;}
function setLabel(k){const v=DATA[idx];codes[v.video_id]=codes[v.video_id]||{};codes[v.video_id].label=k;save();render();}
function setNotes(t){const v=DATA[idx];codes[v.video_id]=codes[v.video_id]||{};codes[v.video_id].notes=t;save();updateProg();}
function go(i){idx=Math.max(0,Math.min(DATA.length-1,i));render();}
function nextUncoded(){for(let j=1;j<=DATA.length;j++){const i=(idx+j)%DATA.length;if(!(codes[DATA[i].video_id]&&codes[DATA[i].video_id].label)){go(i);return;}}}
function updateProg(){const done=countDone();document.getElementById('prog').textContent=done+' / '+DATA.length+' codées';document.getElementById('barfill').style.width=(100*done/DATA.length)+'%';}
function render(){
  const v=DATA[idx]; const cur=(codes[v.video_id]||{});
  const tr = v.transcript ? '<div class="transcript">'+esc(v.transcript)+'</div>'
            : '<div class="notranscript">Pas de transcript disponible — juge sur le titre et la description ci-dessous.</div>';
  const labs = LABELS.map((L,i)=>'<button class="lab'+(cur.label===L.k?' sel':'')+'" onclick="setLabel(\''+L.k+'\')">'
      +'<span class="num">'+(i+1)+'</span><span><span class="t">'+L.t+'</span><br><span class="d">'+L.d+'</span></span></button>').join('');
  document.getElementById('main').innerHTML =
    '<div style="color:var(--mut);font-size:13px">Vidéo '+(idx+1)+' / '+DATA.length+'</div>'
    +'<h2>'+esc(v.title)+'</h2>'
    +'<div class="meta">'+esc(v.channel)+' · '+fmt(v.views)+' vues · '+esc(v.date)
      +' · <a href="'+v.url+'" target="_blank" rel="noopener">Ouvrir sur YouTube ↗</a></div>'
    +'<div class="labels">'+labs+'</div>'
    +'<div class="hint">Raccourcis : <kbd>1</kbd>–<kbd>7</kbd> pour labelliser · <kbd>←</kbd> <kbd>→</kbd> pour naviguer</div>'
    +'<div class="block"><h3>Notes (cas limite ?)</h3><textarea id="notes" placeholder="optionnel…">'+esc(cur.notes||'')+'</textarea></div>'
    +'<div class="block"><h3>Transcript</h3>'+tr+'</div>'
    +'<div class="block"><h3>Description</h3><div class="desc">'+esc(v.description||'(aucune)')+'</div></div>'
    +'<div class="nav"><button onclick="go(idx-1)">← Précédent</button>'
      +'<button onclick="go(idx+1)">Suivant →</button><span class="sp"></span>'
      +'<button onclick="nextUncoded()">Prochaine non codée</button></div>';
  const ta=document.getElementById('notes'); if(ta) ta.addEventListener('input',e=>setNotes(e.target.value));
  updateProg();
}
document.getElementById('jumpNext').onclick=nextUncoded;
document.getElementById('export').onclick=function(){
  let rows=[['video_id','label_humain','notes']];
  DATA.forEach(v=>{const c=codes[v.video_id]||{};rows.push([v.video_id,c.label||'',(c.notes||'').replace(/"/g,'""')]);});
  let csv='﻿'+rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kappa_mes_codes.csv';a.click();
};
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA')return;
  if(e.key>='1'&&e.key<='7')setLabel(LABELS[+e.key-1].k);
  else if(e.key==='ArrowLeft')go(idx-1);
  else if(e.key==='ArrowRight')go(idx+1);
});
render();
